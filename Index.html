<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDG47 - OBS Studio Alert Widget</title>
    <link
      rel="icon"
      type="image/png"
      href="Img Ordner/Website Icon Ordner/Logo Overlay 1.1.png"
    />
    <link rel="stylesheet" href="sdg47-obs-studio-alert-widget.css" />
    <style></style>
    <script
      type="text/javascript"
      src="https://unpkg.com/@streamerbot/client/dist/streamerbot-client.js"
    ></script>
    <script defer src="sdg47-obs-studio-alert-widget.js"></script>
  </head>
  <body>
    <div id="mainFollowAlertContainerId" class="main-follow-alert-container">
      <div
        id="followAlertVideoAudioContainerId"
        class="follow-alert-video-audio-container"
      >
        <video
          width="600"
          height="600"
          id="followAlertVideoId"
          src="Alert Ordner/Video Ordner/Iridos-alert-follower.webm"
          class="follow-alert-video"
          loading="eager"
        >
          <audio
            id="followAlertAudioId"
            src="Alert Ordner/Audio Ordner/Follow.wav"
            class="follow-alert-audio"
            loading="eager"
          ></audio>
        </video>
      </div>
      <div
        id="followAlertImgTextContainerId"
        class="follow-alert-img-text-container"
      >
        <div id="followAlertImgContainerId" class="follow-alert-img-container">
          <div
            id="followAlertImgBgContainerId"
            class="follow-alert-img-bg-container"
          >
            <img
              width="300"
              height="300"
              id="followAlertImgId"
              src="https://static-cdn.jtvnw.net/jtv_user_pictures/08b15447-db0c-45a9-92e4-2418091cef30-profile_image-300x300.png"
              alt="Shiml_der_Gamer47"
              class="follow-alert-img"
              loading="eager"
            />
          </div>
        </div>
        <div
          id="followAlertTextContainerId"
          class="follow-alert-text-container"
        >
          <span id="followAlertTextSpanId" class="follow-alert-text-span">
            Aktueller Follower
          </span>
        </div>
      </div>
    </div>
    <div id="mainSubAlertContainerId" class="main-sub-alert-container">
      <div
        id="subAlertVideoAudioContainerId"
        class="sub-alert-video-audio-container"

          width="600"

          class="sub-alert-video"
          loading="eager"
        >
          <audio
            id="subAlertAudioId"
            src="Alert Ordner/Audio Ordner/Subscriber.wav"
            class="sub-alert-audio"
          ></audio>
        </video>
      </div>
      <div id="subAlertImgTextContainerId" class="sub-alert-img-text-container">
        <div id="subAlertImgContainerId" class="sub-alert-img-container">
          <div id="subAlertImgBgContainerId" class="sub-alert-img-bg-container">
            <img
              width="300"
              height="300"
              id="subAlertImgId"
              src="https://static-cdn.jtvnw.net/jtv_user_pictures/08b15447-db0c-45a9-92e4-2418091cef30-profile_image-300x300.png"
              alt="Shiml_der_Gamer47"
              class="sub-alert-img"
              loading="eager"

        </div>
        <div id="subAlertTextContainerId" class="sub-alert-text-container">
          <span id="subAlertTextSpanId" class="sub-alert-text-span">
            Aktueller Subscription
          </span>
        </div>
      </div>
    </div>

        </div>
        <div

          class="donation-alert-text-container"

          <span id="donationAlertTextSpanId" class="donation-alert-text-span">

    </div>
  </body>
</html>
